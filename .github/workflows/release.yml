name: Release

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: build
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: python -m pip install uv

      - name: Install project
        run: uv sync

      - name: Run tests
        run: uv run pytest

      - name: Build distributions
        run: |
          rm -rf dist
          uv build

      - name: Smoke test distributions
        run: |
          set -euo pipefail

          wheel="$(python - <<'PY'
          from pathlib import Path

          print(next(Path("dist").glob("*.whl")).resolve())
          PY
          )"
          sdist="$(python - <<'PY'
          from pathlib import Path

          print(next(Path("dist").glob("*.tar.gz")).resolve())
          PY
          )"

          tmpdirs=()
          cleanup() {
            rm -rf "${tmpdirs[@]}"
          }
          trap cleanup EXIT

          for artifact in "$wheel" "$sdist"; do
            workdir="$(mktemp -d)"
            tmpdirs+=("$workdir")
            python -m venv "$workdir/venv"
            "$workdir/venv/bin/python" -m pip install "$artifact"
            "$workdir/venv/bin/continuous-refactoring" --version
            "$workdir/venv/bin/python" -m continuous_refactoring --version
          done

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: publish-pypi
    runs-on: ubuntu-latest
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    environment:
      name: pypi
      url: https://pypi.org/p/continuous-refactoring
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
