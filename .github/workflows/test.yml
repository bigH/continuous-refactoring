name: Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: python -m pip install uv
      - name: Install project
        run: uv sync
      - name: Run tests
        run: uv run pytest
